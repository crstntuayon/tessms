services:
  - type: web
    name: tessms-app
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      # Laravel Core
      - key: APP_NAME
        value: "TugaweES SMS"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://tessms-app.onrender.com
      - key: APP_KEY
        generateValue: true   # Render will auto-generate a random value

      # Database (MySQL) - SET THESE MANUALLY IN RENDER DASHBOARD
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false           # e.g., your-mysql-host.com
      - key: DB_PORT
        value: 3306
      - key: DB_DATABASE
        sync: false           # e.g., tessms_db
      - key: DB_USERNAME
        sync: false           # e.g., tessms_user
      - key: DB_PASSWORD
        sync: false           # Your secure password

      # Session / Cache / Queue (use database driver for free tier)
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: SESSION_SECURE_COOKIE
        value: true
      - key: SESSION_DOMAIN
        value: null

      # Broadcasting (disabled on free tier - no Reverb)
      - key: BROADCAST_CONNECTION
        value: null
      - key: REVERB_SCHEME
        value: https

      # Mail (configure with your provider)
      - key: MAIL_MAILER
        value: log
      - key: MAIL_FROM_ADDRESS
        value: noreply@example.com
      - key: MAIL_FROM_NAME
        value: "TugaweES SMS"

      # PWA / WebPush (SET THESE MANUALLY - generate with php artisan webpush:vapid)
      - key: VAPID_SUBJECT
        value: "mailto:admin@example.com"
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false

      # File Uploads
      - key: FILESYSTEM_DISK
        value: local

      # Vite
      - key: VITE_APP_NAME
        value: "${APP_NAME}"
